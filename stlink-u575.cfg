# 1. 选择调试器接口 (ST-Link)
# 较新版本的 OpenOCD 可以直接使用通用的 stlink.cfg，它会自动适配 V2-1 和 V3
source [find interface/stlink.cfg]

# 备选方案：如果你明确知道你的 ST-Link 版本且自动识别失败，可以使用以下特定版本：
# source [find interface/stlink-v2.cfg]    # 针对早期的 ST-Link V2 (通常是山寨或老款)
# source [find interface/stlink-dap.cfg]   # 针对运行 DAP 固件的 ST-Link V3

# 2. 选择传输层协议
# STM32 芯片调试推荐使用 SWD (Serial Wire Debug) 协议
transport select hla_swd

# 3. 指定目标芯片配置文件
# OpenOCD 官方已经内置了针对 STM32U5 系列的配置文件
source [find target/stm32u5x.cfg]

# 4. 设置适配器速度 (单位: kHz)
# 4000 kHz (4MHz) 是一个比较均衡的速度。如果下载时提示连不上或者不稳定，可以尝试降到 2000 或 1000
adapter speed 4000

# 5. 复位配置 (可选，视硬件设计而定)
# 如果你的板子上 ST-Link 的 NRST 引脚没有连接到 MCU 的复位引脚，可能需要配置为软件复位：
# reset_config none separate